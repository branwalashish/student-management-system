<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Student</title>
</head>
<body>
<h2>Edit Student</h2>

<form th:action="@{/students/{id}(id=${student.id})}" th:object="${student}" method="post">
    <label>Name:</label>
    <input type="text" th:field="*{name}" required><br><br>

    <label>Email:</label>
    <input type="email" th:field="*{email}" required><br><br>

    <label>Course:</label>
    <input type="text" th:field="*{course}" required><br><br>

    <label>Fee:</label>
    <input type="number" step="0.01" th:field="*{fee}" required><br><br>

    <button type="submit">Update</button>
</form>

<br>
<a th:href="@{/students}">Back</a>
</body>
</html>
